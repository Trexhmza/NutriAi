<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Weight Trends — NutriAI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../supabase/db.js"></script>
<script src="../agent/agent.js"></script>
<script src="../shared/components.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
.material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:#12120f; }
::-webkit-scrollbar-thumb { background:#444440; border-radius:10px; }
@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.animate-fade-in { animation:fadeIn 0.5s ease-out forwards; }
</style>
<script id="tailwind-config">
tailwind.config = {
  darkMode:"class",
  theme:{
    extend:{
      colors:{
        "surface":"#12120f","surface-dim":"#12120f","surface-bright":"#383834",
        "surface-container-lowest":"#181814","surface-container-low":"#1e1e1a",
        "surface-container":"#2c2c28","surface-container-high":"#383834","surface-container-highest":"#444440",
        "on-surface":"#f0ece4","on-surface-variant":"#9e9488",
        "outline":"#4a4440","outline-variant":"#3d3832","surface-tint":"#e8a87c",
        "primary":"#e8a87c","on-primary":"#3d1f00","primary-container":"#d4834a","on-primary-container":"#4a2800",
        "secondary":"#7ec8a0","on-secondary":"#00331e","secondary-container":"#3a9d6e","on-secondary-container":"#00331e",
        "tertiary":"#b8a9e8","on-tertiary":"#1e0f4a","tertiary-container":"#8b7ac4","on-tertiary-container":"#1e0f4a",
        "error":"#f28b82","on-error":"#601410","error-container":"#8c2a22","on-error-container":"#ffdad6",
        "background":"#12120f","on-background":"#f0ece4","surface-variant":"#444440"
      },
      borderRadius:{ DEFAULT:"0.25rem", lg:"0.375rem", xl:"0.75rem", "2xl":"1rem", full:"9999px" },
      fontFamily:{ "display":["Playfair Display"], "body":["Inter"], "mono":["JetBrains Mono"] }
    }
  }
}
</script>
</head>
<body class="bg-surface text-on-surface font-body overflow-x-hidden flex flex-col min-h-screen">

<main class="flex-1 pt-28 pb-16 px-6">
  <div class="max-w-6xl mx-auto">
    <div class="text-center md:text-left space-y-2 mb-8 animate-fade-in">
      <span class="text-xs font-mono uppercase tracking-widest text-secondary bg-secondary/10 px-3 py-1.5 rounded-full border border-secondary/20">Weight</span>
      <h1 class="text-4xl font-bold font-display text-on-surface">Weight Trends</h1>
      <p class="text-sm text-on-surface-variant">Track your weight and see the trend over time.</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <!-- Chart Area -->
      <div class="lg:col-span-8 space-y-6" id="chartSection">
        <!-- Stats Cards -->
        <div class="grid grid-cols-3 gap-4">
          <div class="bg-surface-container-low border border-outline-variant p-4 rounded-xl"><h4 class="text-[10px] font-mono text-on-surface-variant uppercase">Starting</h4><p class="text-xl font-bold font-display mt-1 text-on-surface" id="startW">--</p></div>
          <div class="bg-surface-container-low border border-outline-variant p-4 rounded-xl border-primary/20"><h4 class="text-[10px] font-mono text-on-surface-variant uppercase">Current</h4><p class="text-xl font-bold font-display mt-1 text-primary" id="currentW">--</p></div>
          <div class="bg-surface-container-low border border-outline-variant p-4 rounded-xl border-secondary/20"><h4 class="text-[10px] font-mono text-on-surface-variant uppercase">Change</h4><p class="text-xl font-bold font-display mt-1 text-secondary" id="changeW">--</p></div>
        </div>

        <!-- SVG Chart -->
        <div class="bg-surface-container-low border border-outline-variant p-6 rounded-2xl">
          <div class="flex items-center justify-between border-b border-outline-variant/20 pb-4 mb-4">
            <h3 class="text-sm font-semibold uppercase font-mono text-on-surface-variant tracking-wider">Trend</h3>
          </div>
          <div class="w-full relative h-64 bg-surface-container-lowest/50 rounded-xl border border-outline-variant/10 p-2">
            <svg id="trendSvg" class="w-full h-full" viewBox="0 0 600 200" preserveAspectRatio="none">
              <line x1="0" y1="50" x2="600" y2="50" stroke="#383834" stroke-dasharray="4,4" stroke-width="1"/>
              <line x1="0" y1="100" x2="600" y2="100" stroke="#383834" stroke-dasharray="4,4" stroke-width="1"/>
              <line x1="0" y1="150" x2="600" y2="150" stroke="#383834" stroke-dasharray="4,4" stroke-width="1"/>
              <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8a87c" stop-opacity="0.3"/><stop offset="100%" stop-color="#e8a87c" stop-opacity="0"/></linearGradient></defs>
              <path id="areaPath" d="" fill="url(#grad)"/>
              <path id="linePath" d="" fill="none" stroke="#e8a87c" stroke-width="3"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Right: Log + History -->
      <div class="lg:col-span-4 space-y-6">
        <div class="bg-surface-container-low border border-outline-variant p-6 rounded-2xl relative overflow-hidden">
          <div class="absolute top-0 right-0 w-32 h-32 bg-primary opacity-[0.04] blur-3xl rounded-full"></div>
          <h3 class="text-lg font-bold font-display mb-6 border-b border-outline-variant/20 pb-4">Log Weight</h3>
          <form onsubmit="handleWeightSubmit(event)" class="space-y-4">
            <div><label class="block text-xs font-mono uppercase text-on-surface-variant mb-1">Weight (kg)</label><input type="number" step="0.1" id="logW" required min="30" max="250" class="w-full bg-surface-container-lowest border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-4 py-2.5 text-sm text-on-surface" placeholder="76.5"></div>
            <div><label class="block text-xs font-mono uppercase text-on-surface-variant mb-1">Date</label><input type="date" id="logDate" required class="w-full bg-surface-container-lowest border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-4 py-2.5 text-sm text-on-surface"></div>
            <button type="submit" class="w-full py-3 bg-primary text-on-primary hover:brightness-110 text-sm font-semibold rounded-lg transition-all">Log Weight</button>
          </form>
        </div>

        <div class="bg-surface-container-low border border-outline-variant p-6 rounded-2xl">
          <h3 class="text-sm font-semibold uppercase font-mono text-on-surface-variant tracking-wider border-b border-outline-variant/20 pb-4 mb-4">History</h3>
          <div id="weightLogs" class="space-y-2 max-h-[200px] overflow-y-auto pr-1">
            <p class="text-xs text-on-surface-variant text-center py-4">No entries yet.</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
NutriUI.init({ requireAuth: true });

let _weights = [];

document.addEventListener('nutri-ready', async () => {
  document.getElementById('logDate').value = new Date().toISOString().substring(0,10);
  await loadWeights();
});

async function loadWeights() {
  try {
    const data = await NutriDB.getWeights();
    if (data && data.length) { _weights = data.map(w => ({ date: w.log_date, weight: parseFloat(w.weight) })); renderAll(); return; }
  } catch {}
  _weights = [];
  renderAll();
}

function renderAll() {
  _weights.sort((a,b) => new Date(a.date)-new Date(b.date));
  const container = document.getElementById('weightLogs');
  container.innerHTML = '';
  const chartSection = document.getElementById('chartSection');
  if (!_weights.length) {
    container.innerHTML = '<p class="text-xs text-on-surface-variant text-center py-4">No entries yet.</p>';
    if (chartSection) chartSection.classList.add('hidden');
    return;
  }
  if (chartSection) chartSection.classList.remove('hidden');

  const start = _weights[0].weight;
  const current = _weights[_weights.length-1].weight;
  const change = (current - start);
  document.getElementById('startW').textContent = `${start.toFixed(1)} kg`;
  document.getElementById('currentW').textContent = `${current.toFixed(1)} kg`;
  document.getElementById('changeW').textContent = `${change > 0 ? '+' : ''}${change.toFixed(1)} kg`;

  _weights.slice().reverse().forEach(w => {
    const row = document.createElement('div');
    row.className = 'flex justify-between items-center p-2.5 bg-surface-container-high/40 rounded-lg border border-outline-variant/10 text-xs';
    row.innerHTML = `<span class="font-mono text-on-surface-variant">${fmtDate(w.date)}</span><span class="font-bold font-display text-on-surface">${w.weight.toFixed(1)} kg</span>`;
    container.appendChild(row);
  });

  drawChart();
}

function drawChart() {
  if (_weights.length < 2) return;
  const maxW = Math.max(..._weights.map(l=>l.weight)) + 2;
  const minW = Math.min(..._weights.map(l=>l.weight)) - 2;
  const diff = maxW - minW;
  const pts = _weights.map((w,i) => ({
    x: (i / (_weights.length-1)) * 600,
    y: 200 - (((w.weight - minW) / diff) * 160 + 20)
  }));
  let line = `M ${pts[0].x} ${pts[0].y}`;
  for (let i=1; i<pts.length; i++) line += ` L ${pts[i].x} ${pts[i].y}`;
  let area = `${line} L ${pts[pts.length-1].x} 200 L ${pts[0].x} 200 Z`;
  document.getElementById('linePath').setAttribute('d', line);
  document.getElementById('areaPath').setAttribute('d', area);
}

async function handleWeightSubmit(e) {
  e.preventDefault();
  const w = parseFloat(document.getElementById('logW').value);
  const d = document.getElementById('logDate').value;
  if (isNaN(w) || !d) return;
  try {
    await NutriDB.addWeight(w, d);
  } catch (err) { alert(err.message); return; }
  const idx = _weights.findIndex(l => l.date === d);
  if (idx !== -1) _weights[idx].weight = w;
  else _weights.push({ date: d, weight: w });
  renderAll();
  document.getElementById('logW').value = '';
}

function fmtDate(s) {
  const d = new Date(s);
  return d.toLocaleDateString([], { month:'short', day:'2-digit', year:'numeric' });
}
</script>

</body>
</html>
