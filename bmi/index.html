<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BMI Calculator — NutriAI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../supabase/db.js"></script>
<script src="../agent/agent.js"></script>
<script src="../shared/components.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
.material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:#12120f; }
::-webkit-scrollbar-thumb { background:#444440; border-radius:10px; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:20px; height:20px; border-radius:50%; background:#e8a87c; cursor:pointer; box-shadow:0 0 12px rgba(232,168,124,0.4); transition:transform 0.1s; }
input[type="range"]::-webkit-slider-thumb:hover { transform:scale(1.2); }
@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.animate-fade-in { animation:fadeIn 0.5s ease-out forwards; }
</style>
<script id="tailwind-config">
tailwind.config = {
  darkMode:"class",
  theme:{
    extend:{
      colors:{
        "surface":"#12120f","surface-dim":"#12120f","surface-bright":"#383834",
        "surface-container-lowest":"#181814","surface-container-low":"#1e1e1a",
        "surface-container":"#2c2c28","surface-container-high":"#383834","surface-container-highest":"#444440",
        "on-surface":"#f0ece4","on-surface-variant":"#9e9488",
        "outline":"#4a4440","outline-variant":"#3d3832","surface-tint":"#e8a87c",
        "primary":"#e8a87c","on-primary":"#3d1f00","primary-container":"#d4834a","on-primary-container":"#4a2800",
        "secondary":"#7ec8a0","on-secondary":"#00331e","secondary-container":"#3a9d6e","on-secondary-container":"#00331e",
        "tertiary":"#b8a9e8","on-tertiary":"#1e0f4a","tertiary-container":"#8b7ac4","on-tertiary-container":"#1e0f4a",
        "error":"#f28b82","on-error":"#601410","error-container":"#8c2a22","on-error-container":"#ffdad6",
        "background":"#12120f","on-background":"#f0ece4","surface-variant":"#444440"
      },
      borderRadius:{ DEFAULT:"0.25rem", lg:"0.375rem", xl:"0.75rem", "2xl":"1rem", full:"9999px" },
      fontFamily:{ "display":["Playfair Display"], "body":["Inter"], "mono":["JetBrains Mono"] }
    }
  }
}
</script>
</head>
<body class="bg-surface text-on-surface font-body overflow-x-hidden flex flex-col min-h-screen">

<main class="flex-1 pt-28 pb-16 px-6">
  <div class="max-w-5xl mx-auto">
    <div class="text-center md:text-left space-y-2 mb-8 animate-fade-in">
      <span class="text-xs font-mono uppercase tracking-widest text-tertiary bg-tertiary/10 px-3 py-1.5 rounded-full border border-tertiary/20">Free Tool</span>
      <h1 class="text-4xl font-bold font-display text-on-surface">BMI Calculator</h1>
      <p class="text-sm text-on-surface-variant">Check your body mass index and healthy weight range.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-12 gap-8">
      <!-- Sliders -->
      <div class="md:col-span-7 bg-surface-container-low border border-outline-variant p-8 rounded-2xl space-y-6">
        <div class="flex justify-between items-center pb-4 border-b border-outline-variant/20">
          <span class="text-xs font-mono uppercase text-on-surface-variant">Gender</span>
          <div class="flex bg-surface-container-lowest p-1 rounded-lg border border-outline-variant/40">
            <button onclick="setGender('male')" id="btnM" class="px-4 py-1.5 text-xs font-semibold rounded bg-primary text-on-primary transition-all">Male</button>
            <button onclick="setGender('female')" id="btnF" class="px-4 py-1.5 text-xs font-semibold rounded text-on-surface-variant hover:text-on-surface transition-all">Female</button>
          </div>
        </div>
        <div class="space-y-3">
          <div class="flex justify-between items-end"><label class="text-xs font-mono uppercase text-on-surface-variant">Age</label><span class="text-xl font-bold font-display"><span id="ageVal">25</span> <span class="text-xs font-normal text-on-surface-variant">yrs</span></span></div>
          <input type="range" id="ageR" min="15" max="85" value="25" class="w-full bg-surface-container-highest rounded-lg h-2 appearance-none cursor-pointer" oninput="calcBMI()">
        </div>
        <div class="space-y-3">
          <div class="flex justify-between items-end"><label class="text-xs font-mono uppercase text-on-surface-variant">Height</label><span class="text-xl font-bold font-display"><span id="hVal">175</span> <span class="text-xs font-normal text-on-surface-variant">cm</span></span></div>
          <input type="range" id="heightR" min="100" max="220" value="175" class="w-full bg-surface-container-highest rounded-lg h-2 appearance-none cursor-pointer" oninput="calcBMI()">
        </div>
        <div class="space-y-3">
          <div class="flex justify-between items-end"><label class="text-xs font-mono uppercase text-on-surface-variant">Weight</label><span class="text-xl font-bold font-display"><span id="wVal">70</span> <span class="text-xs font-normal text-on-surface-variant">kg</span></span></div>
          <input type="range" id="weightR" min="30" max="150" value="70" class="w-full bg-surface-container-highest rounded-lg h-2 appearance-none cursor-pointer" oninput="calcBMI()">
        </div>
      </div>

      <!-- Results -->
      <div class="md:col-span-5 bg-surface-container-low border border-outline-variant p-8 rounded-2xl flex flex-col items-center text-center relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-primary opacity-[0.04] blur-3xl rounded-full"></div>
        <span class="text-xs font-mono uppercase text-on-surface-variant mb-4">Your BMI</span>
        <div class="text-6xl font-bold font-display text-primary" id="bmiResult">22.9</div>
        <div class="mt-2 text-xs font-mono uppercase px-3 py-1 bg-secondary/15 text-secondary border border-secondary/20 rounded-full" id="bmiCat">Normal</div>
        
        <div class="w-full mt-6 bg-surface-container-lowest/40 p-4 rounded-xl border border-outline-variant/20">
          <p class="text-[10px] font-mono text-on-surface-variant uppercase">Healthy Weight Range</p>
          <p class="text-lg font-bold font-display mt-1 text-secondary" id="rangeDisplay">63.5 - 77.5 kg</p>
        </div>
        <div class="w-full mt-3 bg-surface-container-lowest/40 p-4 rounded-xl border border-outline-variant/20">
          <p class="text-[10px] font-mono text-on-surface-variant uppercase">Basal Metabolic Rate</p>
          <p class="text-lg font-bold font-display mt-1 text-primary" id="bmrDisplay">1,650</p>
          <p class="text-[9px] text-on-surface-variant mt-0.5">kcal/day — varies with age</p>
        </div>

        <!-- Meter -->
        <div class="w-full mt-6 space-y-1.5">
          <div class="h-2 w-full bg-surface-container-highest rounded-full overflow-hidden flex" id="meterBar">
            <div id="zUnder" class="h-full bg-blue-400" style="width:25%"></div>
            <div id="zNorm" class="h-full bg-secondary" style="width:25%"></div>
            <div id="zOver" class="h-full bg-yellow-500" style="width:20%"></div>
            <div id="zObese" class="h-full bg-red-500" style="width:30%"></div>
          </div>
          <div class="flex justify-between text-[9px] font-mono text-on-surface-variant/60 px-0.5"><span>Under</span><span>Normal</span><span>Over</span><span>Obese</span></div>
          <div class="relative w-full h-4"><span id="needle" class="material-symbols-outlined absolute -top-1.5 -translate-x-1/2 text-primary text-base transition-all duration-300">change_history</span></div>
        </div>

        <div class="mt-4 p-4 bg-surface-container-lowest/50 rounded-xl border border-outline-variant/20 text-xs text-on-surface-variant leading-relaxed" id="feedback"></div>
      </div>
    </div>
  </div>
</main>

<script>
NutriUI.init({ requireAuth: false });

let _gender = 'male';

function setGender(g) {
  _gender = g;
  document.getElementById('btnM').className = g==='male' ? 'px-4 py-1.5 text-xs font-semibold rounded bg-primary text-on-primary transition-all' : 'px-4 py-1.5 text-xs font-semibold rounded text-on-surface-variant hover:text-on-surface transition-all';
  document.getElementById('btnF').className = g==='female' ? 'px-4 py-1.5 text-xs font-semibold rounded bg-primary text-on-primary transition-all' : 'px-4 py-1.5 text-xs font-semibold rounded text-on-surface-variant hover:text-on-surface transition-all';
  calcBMI();
}

function calcBMI() {
  const h = parseFloat(document.getElementById('heightR').value);
  const w = parseFloat(document.getElementById('weightR').value);
  const a = parseInt(document.getElementById('ageR').value);
  document.getElementById('hVal').textContent = h;
  document.getElementById('wVal').textContent = w;
  document.getElementById('ageVal').textContent = a;

  const bmiVal = w / ((h/100)*(h/100));
  const bmi = bmiVal.toFixed(1);
  document.getElementById('bmiResult').textContent = bmi;

  const bmr = _gender === 'male'
    ? Math.round(10 * w + 6.25 * h - 5 * a + 5)
    : Math.round(10 * w + 6.25 * h - 5 * a - 161);
  document.getElementById('bmrDisplay').textContent = bmr.toLocaleString();

  const minW = 18.5 * ((h/100)*(h/100));
  const maxW = 24.9 * ((h/100)*(h/100));
  document.getElementById('rangeDisplay').textContent = `${minW.toFixed(1)} - ${maxW.toFixed(1)} kg`;

  let cat = 'Normal', cls = 'bg-secondary/15 text-secondary border-secondary/20';
  let feedback = '';
  if (bmiVal < 18.5) {
    cat='Underweight'; cls='bg-blue-400/15 text-blue-400 border-blue-400/20';
    feedback = `Underweight for a ${a}-year-old ${_gender}. Consider gaining weight toward ${minW.toFixed(1)} kg.`;
  } else if (bmiVal < 25) {
    cat='Normal'; cls='bg-secondary/15 text-secondary border-secondary/20';
    feedback = `Healthy range for a ${a}-year-old ${_gender}. Keep maintaining your balanced lifestyle.`;
  } else if (bmiVal < 30) {
    cat='Overweight'; cls='bg-yellow-500/15 text-yellow-500 border-yellow-500/20';
    feedback = a >= 65
      ? `Slightly elevated BMI, which may be less concerning at your age. Aim for ${maxW.toFixed(1)} kg or below.`
      : `Slightly above the healthy range. Aim for ${maxW.toFixed(1)} kg or below.`;
  } else {
    cat='Obese'; cls='bg-red-500/15 text-red-500 border-red-500/20';
    feedback = `Well above the healthy range. Target ${minW.toFixed(1)}-${maxW.toFixed(1)} kg for your height.`;
  }

  document.getElementById('bmiCat').textContent = cat;
  document.getElementById('bmiCat').className = `text-xs font-mono uppercase px-3 py-1 border rounded-full inline-block ${cls}`;
  document.getElementById('feedback').textContent = feedback ? `"${feedback}"` : '';

  const uW = 16, ob = 35, full = ob - uW;
  const pU = ((18.5-uW)/full)*100;
  const pN = ((25-18.5)/full)*100;
  const pO = ((30-25)/full)*100;
  const pOb = Math.max(0, ((ob-30)/full)*100);
  document.getElementById('zUnder').style.width = `${pU.toFixed(1)}%`;
  document.getElementById('zNorm').style.width = `${pN.toFixed(1)}%`;
  document.getElementById('zOver').style.width = `${pO.toFixed(1)}%`;
  document.getElementById('zObese').style.width = `${pOb.toFixed(1)}%`;
  document.getElementById('needle').style.left = `${Math.min(100, Math.max(0, ((bmiVal-uW)/full)*100))}%`;
}

calcBMI();
</script>

</body>
</html>
